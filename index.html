<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetherfall | Application</title>
    <style>
        :root { --bg: #0b0e14; --card: #151921; --accent: #7289da; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; border-top: 4px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #1c222d; border: 1px solid #2d343f; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #5b6eae; }
        .admin-link { display: block; text-align: center; margin-top: 15px; color: #555; text-decoration: none; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Join Aetherfall</h2>
    <form action="process.php?action=submit" method="POST">
        <input type="text" name="username" placeholder="Full Name / Alias" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="social" placeholder="Social Media (@handle / Discord)" required>
        
        <label>Role</label>
        <select name="role">
            <option value="Writer">Writer</option>
            <option value="Artist">Artist</option>
            <option value="Lore Master">Lore Master</option>
        </select>

        <textarea name="sample" rows="4" placeholder="Why do you want to join Aetherfall?" required></textarea>
        <button type="submit">Submit Application</button>
    </form>
    <a href="process.php?action=login_page" class="admin-link">Owner Login</a>
</div>

</body>
</html>
